crossplane:
  namespace: crossplane-system
  # Name of the Crossplane ProviderConfig that holds the DHCP API connection details.
  # Override this if you have multiple provider configs (e.g. per-site or per-environment).
  providerConfigName: dhcp-http

apiServer:
  url: https://dhcp-api.lab.local
  tokenSecretRef:
    name: dhcp-api-token
    namespace: crossplane-system
    key: token

dhcp_values:
  scopeName: "tomer-hc-workers"
  network: "10.20.30.0"
  subnetMask: "255.255.255.0"
  startRange: "10.20.30.11"
  endRange: "10.20.30.240"
  leaseDurationDays: 8
  description: "DHCP scope for tomer hosted cluster"
  gateway: "10.20.30.1"

  dns:
    # IMPORTANT: DNS server order is preserved exactly as written here.
    # First entry = primary DNS, second = secondary. The API does NOT sort them.
    # Windows DHCP returns servers in the order they were set, so this order must
    # match what the DHCP server has stored — otherwise Crossplane will PUT every 60 seconds.
    servers:
      - "10.50.1.5"
      - "10.50.1.6"
    domain: "tomer.lab.local"

  # IMPORTANT: exclusions MUST be listed in ascending IP numerical order.
  # The API always returns exclusions sorted by IP. If values.yaml order differs from IP
  # numerical order, Crossplane will detect a mismatch on every GET and issue a PUT
  # every 60 seconds indefinitely (reconciliation loop).
  # Correct:   10.20.30.1 → 10.20.30.10, then 10.20.30.241 → 10.20.30.254
  # Incorrect: 10.20.30.241 first — would cause a PUT loop.
  exclusions:
    - startAddress: "10.20.30.1"
      endAddress: "10.20.30.10"
    - startAddress: "10.20.30.241"
      endAddress: "10.20.30.254"

  failover:
    partnerServer: "dhcp02.lab.local"
    relationshipName: "tomer-hc-failover"
    mode: "HotStandby"
    serverRole: "Active" # Active on this server, Standby on partner
    reservePercent: 5 # % of IPs reserved for standby server
    maxClientLeadTimeMinutes: 60
    sharedSecret: null

  # failover:
  # partnerServer: "dhcp02.lab.local"
  # relationshipName: "tomer-hc-failover"
  # mode: "LoadBalance"
  # loadBalancePercent: 50      # % handled by THIS server
  # maxClientLeadTimeMinutes: 60
  # sharedSecret: null
